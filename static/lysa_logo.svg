<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <!-- Glow filter for center dot -->
    <radialGradient id="centerGlow" cx="50%" cy="35%" r="12%">
      <stop offset="0%" stop-color="#4ecdc4" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#4ecdc4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </radialGradient>
    <!-- Outer glow -->
    <radialGradient id="outerGlow" cx="50%" cy="35%" r="20%">
      <stop offset="60%" stop-color="#4ecdc4" stop-opacity="0"/>
      <stop offset="85%" stop-color="#4ecdc4" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#4ecdc4" stop-opacity="0"/>
    </radialGradient>
    <!-- Google Fonts workaround: use system sans-serif thin as fallback -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Jura:wght@300&amp;display=swap');
      .wordmark { font-family: 'Jura', 'Helvetica Neue', sans-serif; font-weight: 300; }
      .subtitle { font-family: 'Jura', 'Helvetica Neue', sans-serif; font-weight: 300; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="600" height="600" fill="#0a0e1a"/>

  <!-- Ambient glow -->
  <circle cx="300" cy="210" r="120" fill="url(#outerGlow)"/>

  <!-- Outer glow halos -->
  <circle cx="300" cy="210" r="104" fill="none" stroke="#4ecdc4" stroke-width="0.6" stroke-opacity="0.08"/>
  <circle cx="300" cy="210" r="108" fill="none" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.05"/>
  <circle cx="300" cy="210" r="112" fill="none" stroke="#4ecdc4" stroke-width="0.4" stroke-opacity="0.03"/>

  <!-- Concentric rings -->
  <circle cx="300" cy="210" r="48" fill="none" stroke="#4ecdc4" stroke-width="1.8" stroke-opacity="0.95"/>
  <circle cx="300" cy="210" r="66" fill="none" stroke="#4ecdc4" stroke-width="1.5" stroke-opacity="0.85"/>
  <circle cx="300" cy="210" r="84" fill="none" stroke="#4ecdc4" stroke-width="1.3" stroke-opacity="0.75"/>
  <circle cx="300" cy="210" r="100" fill="none" stroke="#4ecdc4" stroke-width="1.1" stroke-opacity="0.65"/>

  <!-- Cardinal crosshair reticle lines -->
  <line x1="300" y1="198" x2="300" y2="95" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="300" y1="222" x2="300" y2="325" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="288" y1="210" x2="185" y2="210" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.5"/>
  <line x1="312" y1="210" x2="415" y2="210" stroke="#4ecdc4" stroke-width="0.8" stroke-opacity="0.5"/>

  <!-- Diagonal tick marks on rings -->
  <!-- 45 degrees -->
  <line x1="331.4" y1="178.6" x2="337.1" y2="172.9" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="346.7" y1="163.3" x2="352.4" y2="157.6" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="359.4" y1="150.6" x2="365.1" y2="144.9" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="370.7" y1="139.3" x2="376.4" y2="133.6" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- 135 degrees -->
  <line x1="268.6" y1="178.6" x2="262.9" y2="172.9" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="253.3" y1="163.3" x2="247.6" y2="157.6" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="240.6" y1="150.6" x2="234.9" y2="144.9" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="229.3" y1="139.3" x2="223.6" y2="133.6" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- 225 degrees -->
  <line x1="268.6" y1="241.4" x2="262.9" y2="247.1" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="253.3" y1="256.7" x2="247.6" y2="262.4" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="240.6" y1="269.4" x2="234.9" y2="275.1" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="229.3" y1="280.7" x2="223.6" y2="286.4" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <!-- 315 degrees -->
  <line x1="331.4" y1="241.4" x2="337.1" y2="247.1" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="346.7" y1="256.7" x2="352.4" y2="262.4" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="359.4" y1="269.4" x2="365.1" y2="275.1" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>
  <line x1="370.7" y1="280.7" x2="376.4" y2="286.4" stroke="#4ecdc4" stroke-width="0.5" stroke-opacity="0.3"/>

  <!-- Center glow -->
  <circle cx="300" cy="210" r="18" fill="url(#centerGlow)"/>

  <!-- Center bright dot -->
  <circle cx="300" cy="210" r="3.5" fill="#4ecdc4" fill-opacity="1"/>
  <circle cx="300" cy="210" r="1.5" fill="#ffffff" fill-opacity="0.8"/>

  <!-- Wordmark "lysa" with wide tracking -->
  <text x="300" y="430" text-anchor="middle" class="wordmark" fill="#ffffff" fill-opacity="0.92" font-size="72" letter-spacing="18">lysa</text>
</svg>
